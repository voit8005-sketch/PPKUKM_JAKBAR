{% extends "base.html" %}
{% block title %}Tambah Staff - Admin PPKUKM{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto py-6">
  <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-2xl rounded-3xl shadow-2xl border border-white/60 dark:border-gray-700/50 overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-emerald-500"></div>
    <div class="p-8">
      <h1 class="text-xl font-black text-gray-900 dark:text-white mb-1">Tambah Akun Staff</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Sistem akan membuat password sementara; staff akan dipaksa menggantinya saat login pertama.</p>
      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Username <span class="text-red-500">*</span></label>
          <input type="text" name="username" required maxlength="50" class="w-full px-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Email <span class="text-red-500">*</span></label>
          <input type="email" name="email" required class="w-full px-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">NIP <span class="text-gray-400 font-normal">(opsional)</span></label>
          <input type="text" name="nip" maxlength="30" class="w-full px-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50" />
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/25 text-sm">Buat Akun Staff</button>
          <a href="{{ url_for('admin_staff_list') }}" class="inline-flex items-center justify-center px-5 py-3 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-semibold rounded-xl text-sm">Batal</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
